<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PipFactor</title>
    <meta name="description" content="AI-powered market intelligence platform: insights, sentiment, and a simple stock score." />
    <meta name="author" content="pipfactor" />
    
    <!-- Favicons for SEO and cross-browser support -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />

    <!-- Security Headers - Note: X-Frame-Options and CSP frame-ancestors should be set via HTTP headers, not meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://static.cloudflareinsights.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.pipfactor.com http://localhost:* ws://localhost:* https://challenges.cloudflare.com https://static.cloudflareinsights.com; frame-src https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />

    <!-- Fonts with integrity check -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />

    <meta property="og:title" content="pipfactor" />
    <meta property="og:description" content="AI-powered market intelligence platform: insights, sentiment, and a simple stock score." />
    <meta property="og:type" content="website" />
    
    <meta name="theme-color" content="#080c15" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PipFactor",
        "url": "https://pipfactor.com",
        "logo": "https://pipfactor.com/pipfactor.svg"
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What assets do you support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We start with XAUUSD and major FX pairs, and can expand to indices and crypto based on demand."
            }
          },
          {
            "@type": "Question",
            "name": "How fresh are the signals?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Signals are generated and updated throughout the trading day as market conditions change."
            }
          },
          {
            "@type": "Question",
            "name": "Do you store my data?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We store only what's required to operate the service. You control your integrations and can opt out anytime."
            }
          },
          {
            "@type": "Question",
            "name": "Can I integrate with Telegram or other platforms?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. We support Telegram notifications and can integrate with your preferred tools."
            }
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script
      id="cf-turnstile-script"
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
      async
      defer
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
